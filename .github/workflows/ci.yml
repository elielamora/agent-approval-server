name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - run: bun install
      - run: bun run format:check
      - run: bun run lint
      - run: bun test
      - run: pnpm --dir frontend install
      - run: pnpm --dir frontend build
